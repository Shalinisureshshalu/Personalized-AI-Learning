version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "No dependencies required for static site"
    
    build:
      commands:
        - echo "Build complete"

  artifacts:
    baseDirectory: ./index.html
    files:
      - '**/*'

  cache:
    paths: []

# SPA routing - redirect all routes to index.html
rewrites:
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|svg|woff|woff2|ttf|eot|json|html)$)/.*>
    target: /index.html
    status: 200

# Security headers and caching
headers:
  - pattern: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "no-cache, no-store, must-revalidate"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
  - pattern: "**/*.css"
    headers:
      - key: "Cache-Control"
        value: "max-age=31536000"
      - key: "X-Frame-Options"
        value: "DENY"
  - pattern: "**/*.js"
    headers:
      - key: "Cache-Control"
        value: "max-age=31536000"
      - key: "X-Frame-Options"
        value: "DENY"
  - pattern: "**/*.png"
    headers:
      - key: "Cache-Control"
        value: "max-age=31536000"
  - pattern: "**/*.jpg"
    headers:
      - key: "Cache-Control"
        value: "max-age=31536000"
  - pattern: "**/*.svg"
    headers:
      - key: "Cache-Control"
        value: "max-age=31536000"
  - pattern: "**/*"
    headers:
      - key: "X-XSS-Protection"
        value: "1; mode=block"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
