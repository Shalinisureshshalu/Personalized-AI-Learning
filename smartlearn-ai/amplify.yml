# ==============================================
# AWS Amplify Configuration for SmartLearn AI
# ==============================================
# This file configures AWS Amplify for deploying
# our static website with simulated AWS services

version: 1

frontend:
  phases:
    # Pre-build phase - install dependencies (if needed)
    preBuild:
      commands:
        - echo "No pre-build dependencies required for static HTML/CSS/JS"
    
    # Build phase - no build step needed for static files
    build:
      commands:
        - echo "Building static site..."
        - ls -la
        - echo "Build complete - static files ready"
  
  artifacts:
    # Base directory containing the static files
    baseDirectory: .
    # All files to be deployed
    files:
      - '**/*'
  
  # Cache configuration for faster builds
  cache:
    paths: []

# Custom headers for better performance
headers:
  - pattern: "**/*"
    headers:
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-XSS-Protection"
        value: "1; mode=block"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"

# Rewrites and redirects for SPA behavior (if needed)
rewrites:
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|svg|woff|woff2|ttf|eot|json|html)$)/.*>
    target: /index.html
    status: 200
